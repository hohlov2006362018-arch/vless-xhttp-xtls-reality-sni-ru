name: VPN Parser v2 — Real xray-core Test

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info

jobs:
  parse:
    name: Parse & Test VPN Keys
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🦀 Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-v2-

      - name: 🔧 Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip curl

      - name: 🔨 Build
        run: |
          cargo build --release
          cp target/release/vpn_parser ./vpn_parser.x
          chmod +x ./vpn_parser.x
          echo "Binary: $(du -h vpn_parser.x | cut -f1)"

      - name: 🚀 Run VPN Parser v2
        run: |
          echo "Starting at $(date -u)"
          ./vpn_parser.x
          echo ""
          echo "═══════════════════════════════════════"
          if [ -f best_ru_cidr_xhttp_reality.txt ]; then
            echo "File: $(du -h best_ru_cidr_xhttp_reality.txt | cut -f1)"
            echo "Keys: $(grep -c '^vless://' best_ru_cidr_xhttp_reality.txt || echo 0)"
            echo ""
            head -30 best_ru_cidr_xhttp_reality.txt
          else
            echo "No output!"
            exit 1
          fi

      - name: 📤 Commit & Push
        run: |
          git config --global user.name "VPN Parser Bot"
          git config --global user.email "bot@vpn-parser.local"
          git add best_ru_cidr_xhttp_reality.txt
          KEY_COUNT=$(grep -c '^vless://' best_ru_cidr_xhttp_reality.txt 2>/dev/null || echo 0)
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          git diff --cached --quiet || \
            git commit -m "🔑 v2: ${KEY_COUNT} working keys [${TIMESTAMP}]" \
                       -m "Real xray-core tested, traffic verified"
          git push || echo "Nothing to push"

      - name: 📎 Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vpn-keys-v2-${{ github.run_number }}
          path: best_ru_cidr_xhttp_reality.txt
          retention-days: 30
