name: VPN Parser — VLESS XHTTP Reality RU

on:
  # Запуск по расписанию: каждые 6 часов
  schedule:
    - cron: '0 */6 * * *'
  # Ручной запуск
  workflow_dispatch:
  # При пуше в main
  push:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info

jobs:
  parse:
    name: Parse VPN Keys
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ──────────────────────────────────────
      # 1. Checkout
      # ──────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ──────────────────────────────────────
      # 2. Кеш Rust toolchain
      # ──────────────────────────────────────
      - name: 🦀 Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # ──────────────────────────────────────
      # 3. Кеш Cargo
      # ──────────────────────────────────────
      - name: 📦 Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ──────────────────────────────────────
      # 4. Сборка
      # ──────────────────────────────────────
      - name: 🔨 Build release binary
        run: |
          cargo build --release
          cp target/release/vpn_parser ./vpn_parser.x
          chmod +x ./vpn_parser.x
          echo "Binary size: $(du -h vpn_parser.x | cut -f1)"

      # ──────────────────────────────────────
      # 5. Запуск парсера
      # ──────────────────────────────────────
      - name: 🚀 Run VPN Parser
        run: |
          echo "Starting VPN Parser at $(date -u)"
          ./vpn_parser.x
          echo ""
          echo "═══════════════════════════════════════"
          echo "Results:"
          if [ -f best_ru_cidr_xhttp_reality.txt ]; then
            echo "File size: $(du -h best_ru_cidr_xhttp_reality.txt | cut -f1)"
            echo "Total keys: $(grep -c '^vless://' best_ru_cidr_xhttp_reality.txt || echo 0)"
            echo ""
            echo "First 10 lines:"
            head -20 best_ru_cidr_xhttp_reality.txt
          else
            echo "No output file generated!"
            exit 1
          fi

      # ──────────────────────────────────────
      # 6. Коммит результатов
      # ──────────────────────────────────────
      - name: 📤 Commit & Push results
        run: |
          git config --global user.name "VPN Parser Bot"
          git config --global user.email "bot@vpn-parser.local"
          git add best_ru_cidr_xhttp_reality.txt
          
          KEY_COUNT=$(grep -c '^vless://' best_ru_cidr_xhttp_reality.txt 2>/dev/null || echo 0)
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          
          git diff --cached --quiet || \
            git commit -m "🔑 Update: ${KEY_COUNT} keys [${TIMESTAMP}]" \
                       -m "Auto-generated by VPN Parser" \
                       -m "Filter: VLESS + XHTTP + Reality + RU CIDR/SNI"
          
          git push || echo "Nothing to push"

      # ──────────────────────────────────────
      # 7. Артефакт
      # ──────────────────────────────────────
      - name: 📎 Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vpn-keys-${{ github.run_number }}
          path: best_ru_cidr_xhttp_reality.txt
          retention-days: 30
